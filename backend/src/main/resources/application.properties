spring.application.name=backend

# ── Server ──────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ───────────────────────────
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ─────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (browser UI for the DB) ──────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ─────────────────────────────────────────────
# JWT secret must be provided through an environment variable.
# Example: set JWT_SECRET=replace_with_a_secure_random_string
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

